name: 'docker-build'
on:
  workflow_dispatch:
    inputs:
      matrix:
        description: Docker build matrix
        type: string
        required: true
jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
      - name: 'Generate docker metadata (tags, labels)'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},value=${{ matrix.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ matrix.version }}
            type=semver,pattern={{major}},value=${{ matrix.version }}
            type=sha
      - name: 'Set up QEMU'
        uses: docker/setup-qemu-action@v3
      - name: 'Set up buildx'
        uses: docker/setup-buildx-action@v3
      - name: 'Login to container registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 'Prevent image rebuild'
        id: image-exists
        uses: ./.github/actions/docker-image-exists
        with:
          image: ${{ matrix.image }}
          tag: ${{ matrix.version }}
      - name: 'Build and push'
        if: ${{ steps.image-exists.outputs.exists == 'false' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./applications/${{ matrix.application }}/Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NPM_REGISTRY_TOKEN=${{ secrets.GITHUB_TOKEN }}
            PNPM_VERSION=8.6.11
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy:
    needs:
      - docker-build
    uses: ./.github/workflows/deploy.yaml
    secrets: inherit
    with:
      release-upstream: main

